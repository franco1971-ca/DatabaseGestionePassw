workflows:
  flutter-full-artifacts:
    name: Flutter Full Optimized Build
    max_build_duration: 60
    triggering:
      events:
        - push
      branches:
        - main   # sostituisci con il branch da monitorare
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
    scripts:
      # 1️⃣ Installazione dipendenze
      - name: Install dependencies
        script: |
          flutter pub get

      # 2️⃣ Esecuzione test (opzionale)
      - name: Run tests
        script: |
          flutter test || echo "Tests failed, continuing..."

      # 3️⃣ Build Android APK
      - name: Build Android APK
        script: |
          flutter build apk --release
          mkdir -p build/artifacts
          cp build/app/outputs/flutter-apk/app-release.apk build/artifacts/

      # 4️⃣ Build Android AppBundle (opzionale)
      - name: Build Android AAB
        script: |
          flutter build appbundle --release
          cp build/app/outputs/bundle/release/app-release.aab build/artifacts/

      # 5️⃣ Build iOS firmata
      - name: Build iOS signed
        script: |
          flutter build ios --release
          mkdir -p build/artifacts
          # Esporta IPA pronto per installazione su iPhone
          xcodebuild -exportArchive \
            -archivePath build/ios/archive/Runner.xcarchive \
            -exportOptionsPlist exportOptions.plist \
            -exportPath build/artifacts

    artifacts:
      - build/artifacts/*.ipa
      - build/artifacts/*.apk
      - build/artifacts/*.aab