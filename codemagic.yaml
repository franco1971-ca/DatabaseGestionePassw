name: Flutter Minimal Build
flutter: stable   # definisce la versione di Flutter
platforms:        # definisce le piattaforme da buildare
  ios: true
  android: true
scripts:
  # Installa dipendenze Flutter
  - flutter pub get

  # Build Android APK
  - flutter build apk --release
  - mkdir -p build/artifacts
  - cp build/app/outputs/flutter-apk/app-release.apk build/artifacts/

  # Build iOS IPA firmata
  - flutter build ios --release
  - mkdir -p build/artifacts
  - xcodebuild -exportArchive \
      -archivePath build/ios/archive/Runner.xcarchive \
      -exportOptionsPlist ios/exportOptions.plist \
      -exportPath build/artifacts

artifacts:
  - build/artifacts/*.ipa
  - build/artifacts/*.apk