workflows:
  flutter-full-artifacts:
    name: Flutter Full Optimized Build
    max_build_duration: 60
    triggering:
      events:
        - push   # rileva i push su qualsiasi branch
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
    scripts:
      - name: Install dependencies
        script: |
          flutter pub get

      - name: Run tests
        script: |
          flutter test || echo "Tests failed, continuing..."

      - name: Build Android APK
        script: |
          flutter build apk --release
          mkdir -p build/artifacts
          cp build/app/outputs/flutter-apk/app-release.apk build/artifacts/

      - name: Build Android AAB
        script: |
          flutter build appbundle --release
          cp build/app/outputs/bundle/release/app-release.aab build/artifacts/

      - name: Build iOS signed
        script: |
          flutter build ios --release
          mkdir -p build/artifacts
          xcodebuild -exportArchive \
            -archivePath build/ios/archive/Runner.xcarchive \
            -exportOptionsPlist exportOptions.plist \
            -exportPath build/artifacts

    artifacts:
      - build/artifacts/*.ipa
      - build/artifacts/*.apk
      - build/artifacts/*.aab