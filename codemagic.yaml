# codemagic.yaml per Flutter Password Manager iOS
workflows:
  ios-release:
    name: iOS Release Workflow
    max_build_duration: 60
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
    scripts:
      - name: Get Flutter dependencies
        script: flutter pub get
      - name: Build iOS release
        script: flutter build ios --release --no-codesign
    artifacts:
      - build/ios/iphoneos/Runner.app
      - build/ios/iphoneos/Runner.ipa
    publishing:
      email:
        recipients:
          - tuo@email.com
    triggers:
      - event: push
        branch: main

# Firma del codice iOS
# Configurabile in Codemagic UI collegando il tuo Apple Developer Account
# e aggiungendo il certificate + provisioning profile
code_signing:
  ios:
    automatic: true
    keychain: default